name: Scheduled Trivy Scan

on:
  schedule:
    # 毎日午前0時に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability scanner (All vulnerabilities for Job Summary)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/debian-stable:latest'
          format: 'table'
          output: 'trivy-report.txt'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Publish Trivy report to Job Summary
        run: |
          if [ -f trivy-report.txt ]; then
            echo "### Trivy Vulnerability Scan Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            rm -f trivy-report.txt
          else
            echo "### Trivy Vulnerability Scan Report" >> $GITHUB_STEP_SUMMARY
            echo "No report file found." >> $GITHUB_STEP_SUMMARY
          fi
        if: always()

      - name: Run Trivy vulnerability scanner (Fail only on fixed vulnerabilities)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/debian-stable:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      - name: Set up Ruby
        if: failure()
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: '3.3.5'

      - name: Run update script
        if: failure()
        run: ruby ./scripts/update-dockerfiles.rb

      - name: Create Pull Request
        if: failure()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update base images due to Trivy vulnerability detection"
          branch: trivy-security-update
          delete-branch: true
          title: "security: update base images due to Trivy vulnerability detection"
          body: |
            Trivy スキャンにより GHCR 上のイメージに脆弱性が検出されたため、ベースイメージのダイジェストと CHANGELOG を自動更新しました。
            
            PR のテストが通過することを確認の上、マージしてください。
