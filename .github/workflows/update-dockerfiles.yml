name: Update Dockerfile Base Images

on:
  schedule:
    # 毎週月曜日の午前9時 (UTC) に実行
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dockerfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run update script
        run: ruby ./scripts/update-dockerfiles.rb

      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@5d869da34e18e7287c1daad50e0b8ea0f506ce69 # v1.11.0
        id: app-token
        with:
          app-id: ${{ secrets.PR_CREATOR_APP_ID }}
          private-key: ${{ secrets.PR_CREATOR_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update debian base image digests"
          branch: update-debian-digests
          delete-branch: true
          title: "chore: update debian base image digests"
          body: |
            Dockerfile 内の Debian ベースイメージのダイジェストを最新に自動更新しました。
            
            変更内容を確認の上、マージしてください。
          labels: |
            dependencies
            docker
