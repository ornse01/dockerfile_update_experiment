name: Publish Stable Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'stable/Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate Tag Name (YYYYMMDD)
        run: echo "TAG_NAME=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: stable/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
