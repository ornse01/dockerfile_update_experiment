name: Publish Stable Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'stable/Dockerfile'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate Tag Name (YYYYMMDD)
        run: echo "TAG_NAME=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: stable/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the published Docker image
        env:
          TAGS: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images="${images} ${tag}@${DIGEST}"
          done
          cosign sign --yes ${images}
