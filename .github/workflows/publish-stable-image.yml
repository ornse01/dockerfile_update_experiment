name: Publish Stable Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'stable/Dockerfile'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate Tag Name (YYYYMMDD)
        run: echo "TAG_NAME=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        id: build-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: stable/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign the published Docker image
        env:
          TAGS: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images="${images} ${tag}@${DIGEST}"
          done
          cosign sign --yes ${images}
