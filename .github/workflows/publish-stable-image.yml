name: Publish Stable Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'stable/Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Tag Name (YYYYMMDD)
        run: echo "TAG_NAME=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: stable/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
