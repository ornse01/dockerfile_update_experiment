name: Publish Stable Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'stable/Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate Tag Name (YYYYMMDD)
        run: echo "TAG_NAME=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: stable/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/debian-stable:${{ env.TAG_NAME }}
            ghcr.io/${{ github.repository_owner }}/debian-stable:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
